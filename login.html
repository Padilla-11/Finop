<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinOp — Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="css/finop.css" rel="stylesheet">
</head>
<body>
<div class="fo-auth-wrap">
  <div class="fo-auth-card">
    <div class="fo-auth-logo">
      <div class="fo-auth-logo-icon">
        <svg width="26" height="26" fill="none" stroke="#fff" viewBox="0 0 24 24" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      </div>
      <div style="font-size:1.6rem;font-weight:700;color:var(--fo-primary);letter-spacing:-.02em;">FinOp</div>
    </div>
    <div class="fo-auth-title">Bienvenido de nuevo</div>
    <div class="fo-auth-sub">Ingresa a tu cuenta para continuar</div>
    <div class="fo-alert danger hidden" id="login-error" style="margin-bottom:1.25rem;">
      <span class="fo-alert-icon">⚠️</span>
      <div class="fo-alert-text">Correo o contraseña incorrectos. Intenta de nuevo.</div>
    </div>
    <form id="login-form" novalidate>
      <div class="fo-form-group">
        <label class="fo-label-text" for="correo">Correo electrónico <span class="fo-required">*</span></label>
        <input class="fo-input" type="email" id="correo" placeholder="tucorreo@ejemplo.com" autocomplete="email">
        <div class="fo-error-msg">Ingresa un correo válido.</div>
      </div>
      <div class="fo-form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.375rem;">
          <label class="fo-label-text" for="contrasena" style="margin:0;">Contraseña <span class="fo-required">*</span></label>
          <a href="#" class="fo-small">¿Olvidaste tu contraseña?</a>
        </div>
        <div style="position:relative;">
          <input class="fo-input" type="password" id="contrasena" placeholder="••••••••" autocomplete="current-password" style="padding-right:2.75rem;">
          <button type="button" id="toggle-pass" title="Mostrar" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--fo-text-muted);padding:0;">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="fo-error-msg">Ingresa tu contraseña.</div>
      </div>
      <div class="fo-form-group" style="margin-bottom:1.5rem;">
        <label class="fo-check-label"><input type="checkbox" id="recordar"> Recordar sesión en este dispositivo</label>
      </div>
      <button type="submit" class="fo-btn fo-btn-primary fo-btn-lg fo-btn-block" id="btn-login">Iniciar sesión</button>
    </form>
    <hr class="fo-divider">
    <p class="text-center fo-small" style="margin:0;">¿No tienes cuenta? <a href="registro.html" style="font-weight:500;">Crear cuenta gratis</a></p>
    <p class="text-center" style="margin-top:.75rem;">
      <span class="fo-badge fo-badge-info" style="font-size:.7rem;">Demo: demo@finop.co / demo123</span>
    </p>
  </div>
</div>
<script src="js/finop.js"></script>
<script src="js/login.js"></script>
</body></html>
